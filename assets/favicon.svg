<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="JS-MISA">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2d4f"/>
      <stop offset="100%" stop-color="#071f38"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0a84d"/>
      <stop offset="100%" stop-color="#cf7a22"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gauge arc -->
  <path d="M12 40 A20 20 0 0 1 52 40" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Tick marks -->
  <g stroke="#5eb3d4" stroke-width="2" stroke-linecap="round">
    <line x1="14" y1="39" x2="14" y2="35"/>
    <line x1="22" y1="28" x2="20" y2="25"/>
    <line x1="32" y1="24" x2="32" y2="20"/>
    <line x1="42" y1="28" x2="44" y2="25"/>
    <line x1="50" y1="39" x2="50" y2="35"/>
  </g>
  <!-- Caliper jaws -->
  <path d="M22 46 L22 34 L26 34 L26 42 L30 42 L30 46 Z" fill="url(#gold)"/>
  <path d="M42 46 L42 34 L38 34 L38 42 L34 42 L34 46 Z" fill="url(#gold)"/>
  <!-- Crosshair / precision target -->
  <circle cx="32" cy="36" r="5.5" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="32" cy="36" r="1.8" fill="#5eb3d4"/>
  <line x1="32" y1="29" x2="32" y2="31.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="40.5" x2="32" y2="43" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="36" x2="27.5" y2="36" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="36.5" y1="36" x2="39" y2="36" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Accreditation check seal -->
  <circle cx="48" cy="16" r="9" fill="#5eb3d4"/>
  <path d="M44 16 L47 19 L53 13" fill="none" stroke="#071f38" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
